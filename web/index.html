<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="academic_project">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>academic_project</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Syncfusion PDF Viewer required scripts for Web -->
  <script src="//cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js"></script>
  <script type="text/javascript">
    pdfjsLib.GlobalWorkerOptions.workerSrc = "//cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.worker.min.js";
  </script>
</head>
<body>
  <!-- Native HTML/CSS Preloader spinner -->
  <div id="loading">
    <style>
      body {
        margin: 0;
        background-color: #0F172A; /* Match deep slate background */
        font-family: 'Inter', system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }
      .loader-container {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      /* Pulsing Logo Circle */
      .logo-circle {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #6366F1 0%, #818CF8 100%);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        margin-bottom: 24px;
        animation: pulse 2s infinite ease-in-out;
      }
      /* Modern Ring Spinner */
      .spinner {
        width: 44px;
        height: 44px;
        border: 4px solid rgba(255, 255, 255, 0.08);
        border-top: 4px solid #6366F1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      .loading-text {
        color: #E2E8F0;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.5px;
        margin: 0;
      }
      .loading-subtext {
        color: #64748B;
        font-size: 13px;
        margin-top: 8px;
        font-weight: 450;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0% { transform: scale(1); box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); }
        50% { transform: scale(1.05); box-shadow: 0 15px 35px rgba(99, 102, 241, 0.6); }
        100% { transform: scale(1); box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); }
      }
    </style>
    <div class="loader-container">
      <div class="logo-circle">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
      </div>
      <div class="spinner"></div>
      <p class="loading-text">EduVision Workspace</p>
      <p class="loading-subtext">Initializing academic environment...</p>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
